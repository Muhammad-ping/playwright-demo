name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Choose Test Suite to Run"
        required: true
        default: "smoke"
        type: choice
        options: ["smoke", "regression", "all"]
      test_name_filter:
        description: "Optional: Filter tests by name (regex supported)"
        required: false
        default: ""
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test_type }}
          TEST_NAME_FILTER: ${{ github.event.inputs.test_name_filter }}
        run: |
          echo "TEST_TYPE=$TEST_TYPE"
          echo "TEST_NAME_FILTER=$TEST_NAME_FILTER"

          # Определяем теги для запуска
          if [ "$TEST_TYPE" = "all" ]; then
            GREP_TAGS="@smoke|@regression"
          else
            GREP_TAGS="@$TEST_TYPE"
          fi

          # Запуск тестов
          if [ -n "$TEST_NAME_FILTER" ]; then
            echo "Running tests filtered by name: $TEST_NAME_FILTER"
            npx playwright test --grep "$TEST_NAME_FILTER" || echo "No tests matched"
          else
            echo "Running tests for tags: $GREP_TAGS"
            npx playwright test --grep "$GREP_TAGS" || echo "No tests matched"
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
